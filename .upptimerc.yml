# Change these first
owner: CodeGuardian-Official # Your GitHub organization or username, where this repository lives
repo: status # The name of this repository

sites:
  - name: Scoppiato
    url: https://www.scoppiato.it
    method: GET
  - name: Notepaddo
    url: https://notepaddo.scoppiato.it
  - name: Hacker News
    url: https://news.ycombinator.com
  - name: Test Broken Site
    url: https://thissitedoesnotexist.koj.co
  - name: IPv6 test
    url: forwardemail.net
    port: 80
    check: "tcp-ping"
    ipv6: true

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.scoppiato.it
  #baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Status Scoppiato Network
  introTitle: "**Scoppiato** the next generation of exploding :D"
  introMessage: here you can see, if a site is down
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

